[build-system]
requires = ["maturin>=1.7,<2.0"]
build-backend = "maturin"

[project]
name = "cacao-nib"
requires-python = ">=3.10"
dynamic = ["version"]

[project.scripts]
nib = "nib.cli:main"

[tool.maturin]
python-source = "python"
module-name = "nib.nib"

[dependency-groups]
dev = [
    "maturin",
    "pytest",
    "ruff",
    "pre-commit",
    "ipython",
]
