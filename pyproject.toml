[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "cacao-nib"
version = "0.1.0"
requires-python = ">=3.11"

[project.scripts]
nib = "nib.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["python/nib"]

[tool.hatch.build.targets.wheel.sources]
"python/nib" = "nib"

[dependency-groups]
dev = [
    "pytest",
]
